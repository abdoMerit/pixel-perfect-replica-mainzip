services:
  - type: web
    name: uff-website
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node start-server.mjs
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false          # paste this from your Render PostgreSQL dashboard
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: NODE_ENV
        value: production

databases:
  - name: uff-db
    databaseName: uff_production
    user: uff_user
    plan: free
